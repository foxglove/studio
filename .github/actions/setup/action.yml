name: "Set up node and yarn"
runs:
  using: composite
  steps:
    - uses: actions/checkout@v2
    - name: Configure Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 15.x
    - name: Restore cache
      uses: actions/cache@v2
      with:
        path: |
          .yarn/cache
          **/node_modules
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-
    - run: yarn install --immutable
