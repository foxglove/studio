name: Cloudflare Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - "main"
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request || github.event.workflow_run.conclusion == 'success'
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-20.04

    env:
      # Environment variables that are injected into the build
      ENABLE_EXPERIMENTAL_COREPACK: 1
      FOXGLOVE_API_URL: https://api-dev.foxglove.party
      FOXGLOVE_CONSOLE_URL: https://console-dev.foxglove.party
      FOXGLOVE_ENABLE_DIALOG_AUTH: 1
      NODE_ENV: production

    steps:
      - if: github.ref == 'refs/heads/main'
        name: Override Environment Variables for Production
        run: |
          echo "FOXGLOVE_API_URL=https://api.foxglove.dev" >> $GITHUB_ENV
          echo "FOXGLOVE_CONSOLE_URL=https://console.foxglove.dev" >> $GITHUB_ENV
          echo "FOXGLOVE_ENABLE_DIALOG_AUTH=0" >> $GITHUB_ENV

      - uses: actions/checkout@v4.1.1
        with:
          lfs: true
          submodules: true

      - uses: actions/setup-node@v4.0.1
        with:
          node-version: 16.17

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn web:build:prod

      - name: vercel-cloudflare compatibility
        run: |
          cp web/.cloudflare/* web/.webpack/

      - uses: cloudflare/pages-action@v1.5.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          gitHubToken: ${{ secrets.FOXGLOVEBOT_GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}
          projectName: foxglove-studio
          directory: web/.webpack
