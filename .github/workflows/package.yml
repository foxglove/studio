name: Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      certPassword:
        description: "Apple Cert Password"
      appleId:
        description: "Apple ID for notarization"
      applePassword:
        description: "Apple app-specific password for notarization"

jobs:
  package:
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            config:
              certSecret: APPLE_CERT_BASE64
          - os: ubuntu-latest
          - os: windows-latest

    env:
      # We use a secret to avoid forks accidentally injecting our production sentry endpoint
      # This DSN isn't actually a "secret" since it is available in the generated client source
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_ID: ${{ github.event.inputs.appleId }}
      APPLE_PASSWORD: ${{ github.event.inputs.applePassword }}

      # Signing key depends on the os platform we are on
      CSC_LINK: ${{ secrets[matrix.platform.config.certSecret] }}
      CSC_PASSWORD: ${{ github.event.inputs.certPassword }}

    name: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v2
        with:
          lfs: true
      - name: Configure Node.js
        uses: actions/setup-node@v2.1.5
        with:
          node-version: 15.x
      - name: Restore cache
        uses: actions/cache@v2.1.4
        with:
          path: |
            .yarn/cache
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - run: yarn install --immutable
      - run: yarn run build:prod
      - run: yarn package --publish onTagOrDraft

      # electron-builder will publish artifacts for draft releases
      # We might want to test packaging an arbitrary commit so we publish the artifacts as well
      - name: Upload package artifact
        uses: actions/upload-artifact@v2
        with:
          name: ${{ runner.os }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.appx
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.rpm
            dist/*.snap
